# Used only via compose.override volume mount - replace the default 404 stub so the SPA can use
# same-origin `/api/v1/*` requests (works for host browsers and in-network Playwright).
# Resolver + variable proxy_pass: defer upstream lookup so nginx can start before `backend` exists.
location /api {
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $upstream_api http://backend:8000;
    proxy_pass $upstream_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}
