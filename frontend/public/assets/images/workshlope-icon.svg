<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Workshlop&#233;">
  <defs>
    <linearGradient id="wi-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="50%" stop-color="#d4b44a"/>
      <stop offset="100%" stop-color="#5c4810"/>
    </linearGradient>
    <linearGradient id="wi-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a9d8f"/>
      <stop offset="100%" stop-color="#0a4a44"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="58" fill="none" stroke="url(#wi-gold)" stroke-width="3.5"/>
  <circle cx="64" cy="64" r="50" fill="#faf9f6" stroke="url(#wi-teal)" stroke-width="2"/>
  <!-- Stroked W: deep valleys + single center apex read as letter, not three peaks -->
  <path
    fill="none"
    stroke="url(#wi-teal)"
    stroke-width="12"
    stroke-linejoin="round"
    stroke-linecap="round"
    d="M 40,88 L 52,40 L 62,74 L 64,34 L 66,74 L 76,40 L 88,88"
  />
  <path
    fill="none"
    stroke="url(#wi-gold)"
    stroke-width="2.2"
    stroke-linecap="round"
    d="M 22,78 Q 18,52 36,38 Q 52,28 64,32"
  />
  <circle cx="64" cy="26" r="3.5" fill="url(#wi-gold)"/>
</svg>
