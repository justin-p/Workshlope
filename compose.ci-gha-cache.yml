# Used only on GitHub Actions (see playwright workflow COMPOSE_FILE). Local use will fail without the Actions cache API.
# Persist BuildKit layers for Compose-built images so `docker compose build` resumes fast on subsequent runs.

services:

  backend:
    build:
      cache_from:
        - type=gha,scope=playwright-backend
      cache_to:
        - type=gha,mode=max,scope=playwright-backend

  authjs-service:
    build:
      cache_from:
        - type=gha,scope=playwright-authjs
      cache_to:
        - type=gha,mode=max,scope=playwright-authjs

  frontend:
    build:
      cache_from:
        - type=gha,scope=playwright-frontend
      cache_to:
        - type=gha,mode=max,scope=playwright-frontend

  playwright:
    build:
      cache_from:
        - type=gha,scope=playwright-test-image
      cache_to:
        - type=gha,mode=max,scope=playwright-test-image
